name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# AGGIUNTO: Permesso obbligatorio per permettere al bot di caricare i file su GitHub Pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # ATTENZIONE: Assicurati che "/TimeKeeper/" sia ESATTAMENTE il nome del tuo Repository GitHub!
      - name: Build web
        run: flutter build web --release --base-href "/TimeKeeper/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web