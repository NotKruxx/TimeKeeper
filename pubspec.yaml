name: salvaore
description: "TimeKeeper — traccia le ore di lavoro, sync Firebase."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── UI ────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  fl_chart: ^1.1.1
  intl: ^0.20.2

  # ── state management ──────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── local storage ─────────────────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # ── firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.0   # v6 — Firebase Auth usa questa versione

  # ── settings ──────────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

  # ── export / import ───────────────────────────────────────────────────────
  csv: ^6.0.0
  share_plus: ^12.0.0
  file_picker: ^10.0.0

  # ── app lifecycle ─────────────────────────────────────────────────────────
  flutter_phoenix: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/icon.png"
